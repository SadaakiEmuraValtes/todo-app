<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">
  <h1>📝 Todo</h1>

  <div class="input-row">
    <input id="new-todo" type="text" placeholder="新しいタスクを入力..." autocomplete="off">
    <input id="new-due" type="date" title="期限日">
    <button id="add-btn" title="追加">＋</button>
  </div>

  <div class="stats">
    <span id="remaining">0件 残り</span>
    <button id="clear-completed">完了済みを削除</button>
  </div>

  <div class="progress-wrap">
    <div class="progress-header">
      <span>進捗</span>
      <strong id="progress-pct">0%</strong>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    </div>
  </div>

  <div class="filters">
    <button class="filter-btn active" data-filter="all">
      すべて<span class="badge" id="badge-all">0</span>
    </button>
    <button class="filter-btn" data-filter="active">
      未完了<span class="badge" id="badge-active">0</span>
    </button>
    <button class="filter-btn" data-filter="completed">
      完了済み<span class="badge" id="badge-completed">0</span>
    </button>
  </div>

  <div class="sort-row">
    <span class="sort-label">並び替え</span>
    <div class="sort-btns">
      <button class="sort-btn active" data-sort="default">デフォルト</button>
      <button class="sort-btn" data-sort="due-asc">期限が近い順 ↑</button>
      <button class="sort-btn" data-sort="due-desc">期限が遠い順 ↓</button>
    </div>
  </div>

  <ul id="todo-list"></ul>
  <p class="empty" id="empty-msg" style="display:none">タスクがありません</p>
</div>

<!-- Loading modal -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal-box">
    <div class="spinner"></div>
    <div class="modal-label">タスクを追加しています…</div>
    <div class="modal-task-name" id="modal-task-name"></div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast">
  <div class="toast-icon">✓</div>
  <span id="toast-msg"></span>
</div>

<script src="app.js"></script>
</body>
</html>
